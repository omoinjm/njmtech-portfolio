services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: njmtech-portfolio
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: sh -c "pnpm install && pnpm dev:local"

volumes:
  node_modules:
  next_cache:
